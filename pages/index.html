<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pages | Md. Saif Zaman</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../new_avatar.jpg">
    <meta name="theme-color" content="#ffffff">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <a href="../index.html">Pages</a>
        </div>
        <div class="nav-right">
            <a href="../index.html">Home</a>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1>Explore All Tools & Resources</h1>
        <p>A collection of tools, trackers, and resources I've built for personal productivity and growth.</p>
    </section>

    <!-- Controls -->
    <div class="pages-container">
        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search pages..." autocomplete="off">
            </div>
            <div class="controls-row">
                <div class="category-pills" id="categoryPills">
                    <!-- Populated by JS -->
                </div>
                <div class="sort-control">
                    <select id="sortSelect">
                        <option value="featured">Featured First</option>
                        <option value="a-z">A — Z</option>
                        <option value="z-a">Z — A</option>
                        <option value="category">By Category</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Results count -->
        <div class="results-info" id="resultsInfo"></div>

        <!-- Pages Grid -->
        <div class="pages-grid" id="pagesGrid">
            <!-- Populated by JS -->
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <i class="fas fa-search"></i>
            <p>No pages found matching your search.</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="pages-footer">
        <p><a href="../index.html" class="footer-home-link">Home</a></p>
        <p>&copy; 2026 - <a href="https://thesaifzaman.github.io/" target="_blank">Md. Saif Zaman</a>. All rights reserved.</p>
    </footer>

    <script src="pages-data.js"></script>
    <script src="script.js"></script>
</body>

</html>
