<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA & ML/AI Visualizer | Md. Saif Zaman</title>
    <link rel="stylesheet" href="shared/shared.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="../new_avatar.jpg">
    <style>
    /* ── Hero ── */
    .hero {
        padding: calc(var(--nav-height) + 3rem) 0 2rem;
        text-align: center;
    }
    .hero h1 {
        font-family: var(--font-mono);
        font-size: clamp(1.6rem, 4.5vw, 2.75rem);
        font-weight: 800;
        color: var(--text-primary);
        letter-spacing: -0.02em;
        line-height: 1.2;
        margin-bottom: 0.75rem;
    }
    .hero h1::before {
        content: '$ ';
        color: var(--accent-cyan);
        font-weight: 400;
    }
    .hero .subtitle {
        font-size: clamp(0.9rem, 2vw, 1.1rem);
        color: var(--text-secondary);
        max-width: 600px;
        margin: 0 auto;
        line-height: 1.6;
    }

    /* ── Stats Bar ── */
    .stats-bar {
        display: flex;
        justify-content: center;
        gap: 2.5rem;
        padding: 1.5rem 0;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
    }
    .stat-item {
        text-align: center;
    }
    .stat-item .stat-value {
        font-family: var(--font-mono);
        font-size: 1.75rem;
        font-weight: 800;
        color: var(--accent-cyan);
    }
    .stat-item .stat-label {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    /* ── Hub Container ── */
    .hub-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem 3rem;
    }

    /* ── Search Box ── */
    .search-box {
        position: relative;
        max-width: 500px;
        margin: 0 auto 1.5rem;
    }
    .search-box i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 0.9rem;
        pointer-events: none;
    }
    .search-box input {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.75rem;
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        color: var(--text-primary);
        font-family: var(--font-mono);
        font-size: 0.9rem;
        outline: none;
        transition: var(--transition);
    }
    .search-box input::placeholder {
        color: var(--text-muted);
    }
    .search-box input:focus {
        border-color: var(--accent-cyan);
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
    }

    /* ── Section Toggles ── */
    .section-toggles {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
    }
    .section-toggle {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        font-weight: 600;
        padding: 0.45rem 1.1rem;
        border: 1px solid var(--border-color);
        border-radius: 999px;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: var(--transition);
    }
    .section-toggle:hover {
        border-color: var(--accent-cyan);
        color: var(--accent-cyan);
    }
    .section-toggle.active {
        background: var(--accent-cyan);
        border-color: var(--accent-cyan);
        color: #fff;
    }

    /* ── Filter Row ── */
    .filter-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.4rem;
        margin-bottom: 0.75rem;
    }
    .cat-pill,
    .diff-pill {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        font-weight: 600;
        padding: 0.3rem 0.8rem;
        border: 1px solid var(--border-color);
        border-radius: 999px;
        background: transparent;
        color: var(--text-secondary);
        cursor: pointer;
        transition: var(--transition);
    }
    .cat-pill:hover,
    .diff-pill:hover {
        border-color: var(--accent);
        color: var(--accent);
    }
    .cat-pill.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
    }

    /* Difficulty pill active states */
    .diff-pill.active[data-diff="all"] {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
    }
    .diff-pill.active[data-diff="Easy"] {
        background: var(--accent-green);
        border-color: var(--accent-green);
        color: #fff;
    }
    .diff-pill.active[data-diff="Medium"] {
        background: var(--accent-amber);
        border-color: var(--accent-amber);
        color: #fff;
    }
    .diff-pill.active[data-diff="Hard"] {
        background: var(--accent-red);
        border-color: var(--accent-red);
        color: #fff;
    }

    /* ── Sort Control ── */
    .sort-control {
        display: flex;
        justify-content: center;
        margin-bottom: 1.5rem;
    }
    .sort-control select {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        padding: 0.45rem 0.85rem;
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        cursor: pointer;
        outline: none;
        transition: var(--transition);
    }
    .sort-control select:focus {
        border-color: var(--accent-cyan);
    }

    /* ── Results Info ── */
    .results-info {
        text-align: center;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-bottom: 1.25rem;
        display: none;
    }
    .results-info.visible {
        display: block;
    }

    /* ── Topics Grid ── */
    .topics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.25rem;
    }

    /* ── Topic Card ── */
    .topic-card {
        display: flex;
        flex-direction: column;
        text-decoration: none;
        color: inherit;
    }
    .topic-card .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.6rem;
    }
    .topic-card .card-category {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
    }
    .topic-card h3 {
        font-family: var(--font-mono);
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0.4rem;
        line-height: 1.3;
    }
    .topic-card p {
        font-size: 0.85rem;
        color: var(--text-secondary);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
        margin-bottom: 0.75rem;
    }
    .topic-card .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--text-muted);
        border-top: 1px solid var(--border-color);
        padding-top: 0.6rem;
        margin-top: auto;
    }
    .topic-card .card-footer i {
        margin-right: 0.3rem;
    }

    /* ── Empty State ── */
    .empty-state {
        text-align: center;
        padding: 4rem 1rem;
        display: none;
    }
    .empty-state.visible {
        display: block;
    }
    .empty-state i {
        font-size: 2.5rem;
        color: var(--text-muted);
        margin-bottom: 1rem;
    }
    .empty-state p {
        font-family: var(--font-mono);
        font-size: 0.95rem;
        color: var(--text-muted);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
        .hero {
            padding: calc(var(--nav-height) + 2rem) 0 1.5rem;
        }
        .hub-container {
            padding: 0 1rem 2rem;
        }
        .stats-bar {
            gap: 1.5rem;
        }
        .stat-item .stat-value {
            font-size: 1.35rem;
        }
        .topics-grid {
            grid-template-columns: 1fr;
        }
        .navbar-links a.nav-text {
            display: none;
        }
    }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a href="index.html" class="navbar-logo">DSA Visualizer</a>
    <div class="navbar-links">
        <a href="../pages/index.html" class="nav-text"><i class="fas fa-th-large"></i> Pages</a>
        <a href="../index.html" class="nav-text"><i class="fas fa-home"></i> Home</a>
        <button class="navbar-theme-toggle" id="themeToggle" aria-label="Toggle theme">
            <i class="fas fa-moon"></i>
        </button>
    </div>
</nav>

<!-- Hero -->
<section class="hero">
    <h1>DSA &amp; ML/AI Visualizer</h1>
    <p class="subtitle">224 interactive algorithm visualizations &mdash; from arrays to transformers, all in one place.</p>
</section>

<!-- Hub Container -->
<div class="hub-container">

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-value" id="statTopics">0</div>
            <div class="stat-label">Topics</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statProblems">0</div>
            <div class="stat-label">Problems</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statCategories">0</div>
            <div class="stat-label">Categories</div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search topics, tags, categories...">
    </div>

    <!-- Section Toggles -->
    <div class="section-toggles">
        <button class="section-toggle active" data-section="all">All</button>
        <button class="section-toggle" data-section="dsa">DSA</button>
        <button class="section-toggle" data-section="ml">ML / AI</button>
    </div>

    <!-- Category Pills -->
    <div class="filter-row" id="categoryPills"></div>

    <!-- Difficulty Pills -->
    <div class="filter-row">
        <button class="diff-pill active" data-diff="all">All</button>
        <button class="diff-pill" data-diff="Easy">Easy</button>
        <button class="diff-pill" data-diff="Medium">Medium</button>
        <button class="diff-pill" data-diff="Hard">Hard</button>
    </div>

    <!-- Sort -->
    <div class="sort-control">
        <select id="sortSelect">
            <option value="category">Sort: By Category</option>
            <option value="az">Sort: A &ndash; Z</option>
            <option value="za">Sort: Z &ndash; A</option>
            <option value="difficulty">Sort: By Difficulty</option>
        </select>
    </div>

    <!-- Results Info -->
    <div class="results-info" id="resultsInfo"></div>

    <!-- Card Grid -->
    <div class="topics-grid" id="topicsGrid"></div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
        <i class="fas fa-search"></i>
        <p>No topics match your filters. Try broadening your search.</p>
    </div>

</div>

<!-- Footer -->
<footer class="dsa-footer">
    <a href="../pages/index.html">Pages</a> &middot;
    <a href="../index.html">Home</a> &middot;
    &copy; 2025 Md. Saif Zaman
</footer>

<!-- Data (no fetch, loaded via script tag) -->
<script src="dsa-data.js"></script>

<!-- Hub Logic -->
<script>
(function () {
    'use strict';

    /* ── Theme Toggle ── */
    var themeBtn = document.getElementById('themeToggle');
    var stored = localStorage.getItem('dsa-theme');
    if (stored === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    function syncIcon() {
        var icon = themeBtn.querySelector('i');
        var dark = document.documentElement.getAttribute('data-theme') === 'dark';
        icon.className = dark ? 'fas fa-sun' : 'fas fa-moon';
    }
    syncIcon();

    themeBtn.addEventListener('click', function () {
        var dark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (dark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('dsa-theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('dsa-theme', 'dark');
        }
        syncIcon();
    });

    /* ── State ── */
    var activeSection = 'all';
    var activeCategory = 'all';
    var activeDifficulty = 'all';
    var searchQuery = '';
    var sortMode = 'category';

    /* ── Stats ── */
    var totalTopics = DSA_DATA.length;
    var totalProblems = DSA_DATA.reduce(function (s, t) { return s + t.problemCount; }, 0);
    var totalCategories = new Set(DSA_DATA.map(function (t) { return t.category; })).size;

    document.getElementById('statTopics').textContent = totalTopics;
    document.getElementById('statProblems').textContent = totalProblems;
    document.getElementById('statCategories').textContent = totalCategories;

    /* ── HTML Escape ── */
    function esc(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /* ── Build Category Pills ── */
    var catContainer = document.getElementById('categoryPills');

    function buildCategoryPills() {
        var sectionFiltered = activeSection === 'all'
            ? DSA_DATA
            : DSA_DATA.filter(function (t) { return t.section === activeSection; });

        var cats = [];
        var seen = {};
        sectionFiltered.forEach(function (t) {
            if (!seen[t.category]) {
                seen[t.category] = true;
                cats.push(t.category);
            }
        });
        cats.sort();

        /* Build pills via DOM to avoid innerHTML for category container */
        catContainer.textContent = '';

        var allBtn = document.createElement('button');
        allBtn.className = 'cat-pill' + (activeCategory === 'all' ? ' active' : '');
        allBtn.setAttribute('data-cat', 'all');
        allBtn.textContent = 'All';
        catContainer.appendChild(allBtn);

        cats.forEach(function (c) {
            var btn = document.createElement('button');
            btn.className = 'cat-pill' + (activeCategory === c ? ' active' : '');
            btn.setAttribute('data-cat', c);
            btn.textContent = c;
            catContainer.appendChild(btn);
        });
    }

    /* ── Filter + Sort ── */
    var diffOrder = { Easy: 0, Medium: 1, Hard: 2 };

    function getFiltered() {
        var list = DSA_DATA;

        if (activeSection !== 'all') {
            list = list.filter(function (t) { return t.section === activeSection; });
        }
        if (activeCategory !== 'all') {
            list = list.filter(function (t) { return t.category === activeCategory; });
        }
        if (activeDifficulty !== 'all') {
            list = list.filter(function (t) { return t.difficulty === activeDifficulty; });
        }
        if (searchQuery) {
            var q = searchQuery.toLowerCase();
            list = list.filter(function (t) {
                return t.title.toLowerCase().indexOf(q) !== -1
                    || t.category.toLowerCase().indexOf(q) !== -1
                    || t.description.toLowerCase().indexOf(q) !== -1
                    || t.tags.some(function (tag) { return tag.toLowerCase().indexOf(q) !== -1; });
            });
        }

        list = list.slice();

        if (sortMode === 'category') {
            list.sort(function (a, b) {
                var c = a.category.localeCompare(b.category);
                return c !== 0 ? c : a.title.localeCompare(b.title);
            });
        } else if (sortMode === 'az') {
            list.sort(function (a, b) { return a.title.localeCompare(b.title); });
        } else if (sortMode === 'za') {
            list.sort(function (a, b) { return b.title.localeCompare(a.title); });
        } else if (sortMode === 'difficulty') {
            list.sort(function (a, b) {
                var d = (diffOrder[a.difficulty] || 0) - (diffOrder[b.difficulty] || 0);
                return d !== 0 ? d : a.title.localeCompare(b.title);
            });
        }

        return list;
    }

    /* ── Render ── */
    var grid = document.getElementById('topicsGrid');
    var resultsInfo = document.getElementById('resultsInfo');
    var emptyState = document.getElementById('emptyState');

    function render() {
        var filtered = getFiltered();
        var hasFilter = activeSection !== 'all' || activeCategory !== 'all' || activeDifficulty !== 'all' || searchQuery !== '';

        /* Results info */
        if (hasFilter) {
            resultsInfo.textContent = filtered.length + ' of ' + totalTopics + ' topics';
            resultsInfo.classList.add('visible');
        } else {
            resultsInfo.classList.remove('visible');
        }

        /* Empty state */
        if (filtered.length === 0) {
            grid.textContent = '';
            emptyState.classList.add('visible');
            return;
        }
        emptyState.classList.remove('visible');

        /* Build cards via DOM */
        var fragment = document.createDocumentFragment();

        filtered.forEach(function (t) {
            var badgeClass = 'badge-' + t.difficulty.toLowerCase();

            var card = document.createElement('a');
            card.href = t.href;
            card.className = 'glass-card topic-card';

            var top = document.createElement('div');
            top.className = 'card-top';

            var catSpan = document.createElement('span');
            catSpan.className = 'card-category';
            catSpan.textContent = t.category;
            top.appendChild(catSpan);

            var badge = document.createElement('span');
            badge.className = badgeClass;
            badge.textContent = t.difficulty;
            top.appendChild(badge);

            card.appendChild(top);

            var h3 = document.createElement('h3');
            h3.textContent = t.title;
            card.appendChild(h3);

            var p = document.createElement('p');
            p.textContent = t.description;
            card.appendChild(p);

            var footer = document.createElement('div');
            footer.className = 'card-footer';

            var probSpan = document.createElement('span');
            var probIcon = document.createElement('i');
            probIcon.className = 'fas fa-code';
            probSpan.appendChild(probIcon);
            probSpan.appendChild(document.createTextNode(t.problemCount + ' problems'));
            footer.appendChild(probSpan);

            var timeSpan = document.createElement('span');
            var timeIcon = document.createElement('i');
            timeIcon.className = 'fas fa-clock';
            timeSpan.appendChild(timeIcon);
            timeSpan.appendChild(document.createTextNode(t.timeComplexity));
            footer.appendChild(timeSpan);

            card.appendChild(footer);
            fragment.appendChild(card);
        });

        grid.textContent = '';
        grid.appendChild(fragment);
    }

    /* ── Event Listeners ── */

    /* Section toggles */
    document.querySelector('.section-toggles').addEventListener('click', function (e) {
        var btn = e.target.closest('.section-toggle');
        if (!btn) return;
        document.querySelectorAll('.section-toggle').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        activeSection = btn.getAttribute('data-section');
        activeCategory = 'all';
        buildCategoryPills();
        render();
    });

    /* Category pills (delegated) */
    catContainer.addEventListener('click', function (e) {
        var btn = e.target.closest('.cat-pill');
        if (!btn) return;
        catContainer.querySelectorAll('.cat-pill').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        activeCategory = btn.getAttribute('data-cat');
        render();
    });

    /* Difficulty pills */
    document.querySelectorAll('.diff-pill').forEach(function (btn) {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.diff-pill').forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');
            activeDifficulty = btn.getAttribute('data-diff');
            render();
        });
    });

    /* Search input */
    document.getElementById('searchInput').addEventListener('input', function (e) {
        searchQuery = e.target.value.trim();
        render();
    });

    /* Sort select */
    document.getElementById('sortSelect').addEventListener('change', function (e) {
        sortMode = e.target.value;
        render();
    });

    /* ── Initial Render ── */
    buildCategoryPills();
    render();

})();
</script>

</body>
</html>
